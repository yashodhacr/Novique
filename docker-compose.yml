services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aipulse
      POSTGRES_PASSWORD: aipulse
      POSTGRES_DB: aipulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://aipulse:aipulse@db:5432/aipulse
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003,http://localhost:3004,http://localhost:3005"
      # Override in any real deployment (≥32 chars). Has a dev default otherwise.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-please-32b}
      # Set ANTHROPIC_API_KEY here (or in .env) for AI-generated summaries.
      # Without it the pipeline uses the deterministic heuristic fallback.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
      # SMTP Settings
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@novique.ai}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Celery worker + embedded beat scheduler: runs the tiered ingestion cadences
  # (news 5 min, papers 30 min, re-score hourly). Reuses the backend image.
  worker:
    build: ./backend
    command: >
      sh -c "python -m app.bootstrap &&
             celery -A app.celery_app worker --beat --loglevel=info"
    environment:
      DATABASE_URL: postgresql+psycopg2://aipulse:aipulse@db:5432/aipulse
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
