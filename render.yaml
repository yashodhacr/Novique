services:
  # 1. FastAPI Backend API + Celery Worker (Combined for Render Free Tier compatibility)
  - type: web
    name: novique-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    dockerCommand: sh -c "python -m app.bootstrap && (celery -A app.celery_app worker --beat --loglevel=info &) && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: novique-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: novique-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: b1c234001@smtp-brevo.com
      - key: SMTP_PASSWORD
        value: OnsZUd9pP8qCA5BX
      - key: SMTP_FROM
        value: no-reply@novique.ai
      - key: ANTHROPIC_API_KEY
        value: ""

  # 2. Redis Instance
  - type: redis
    name: novique-redis
    plan: free
    ipAllowList: []

  # 3. Next.js Frontend
  - type: web
    name: novique-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://novique-backend.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        value: 338636590792-t166pujl1hpuroea7p7idnn4em4tpht4.apps.googleusercontent.com

databases:
  # 4. PostgreSQL Database
  - name: novique-db
    plan: free
