name: Keep Render services awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -fsS --max-time 30 https://novique-backend.onrender.com/health || true
      - name: Ping frontend
        run: curl -fsS --max-time 30 https://novique-frontend.onrender.com/ || true
