services:
  # 1. FastAPI Backend API + Celery Worker (Native Python Runtime)
  - type: web
    name: novique-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m app.bootstrap && (celery -A app.celery_app worker --beat --loglevel=info &) && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: novique-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: novique-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: b1c234001@smtp-brevo.com
      - key: SMTP_PASSWORD
        value: OnsZUd9pP8qCA5BX
      - key: SMTP_FROM
        value: no-reply@novique.ai
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: PYTHON_VERSION
        value: "3.12.0"

  # 2. Redis Instance
  - type: redis
    name: novique-redis
    plan: free
    ipAllowList: []

  # 3. Next.js Frontend (Native Node Runtime)
  - type: web
    name: novique-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://novique-backend.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        value: 338636590792-t166pujl1hpuroea7p7idnn4em4tpht4.apps.googleusercontent.com

databases:
  # 4. PostgreSQL Database
  - name: novique-db
    plan: free
